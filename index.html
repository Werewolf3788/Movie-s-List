    function isHolidaySeason(holidayName) {
        const now = new Date();
        const month = now.getMonth();

        switch (holidayName) {
            case 'Christmas':
                return (month === 10 && date >= 15) || month === 11 || (month === 0 && date <= 5);
            case 'Halloween':
                return (month === 8 && date >= 15) || month === 9 || (month === 10 && date <= 3);
            case 'Thanksgiving':

            case '4th of July':
                return (month === 5 && date >= 20) || (month === 6 && date <= 10);
            case 'Valentine\'s':
                return month === 1 && date <= 16;
            case 'St. Patrick\'s':
                return month === 2 && date <= 20;
            case 'Easter':
                return (month === 2 && date >= 15) || month === 3;
            default:

        }
    }

    function hashString(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = Math.imul(31, hash) + str.charCodeAt(i) | 0;

    function getSafeTimestamp(ds) {
        if (!ds) return 0;
        const cleanDs = ds.trim().replace(/\s+/g, ' ');
        
        const parts = cleanDs.split(' ');
        const datePart = parts[0];
        const timePart = parts[1] || '';
        let ampmPart = parts[2] || '';
        
        const dp = datePart.split(/[\/\-\.]/);
        if (dp.length < 3) return 0;
        let m = parseInt(dp[0]), d = parseInt(dp[1]), y = parseInt(dp[2]);
        if (isNaN(m) || isNaN(d) || isNaN(y)) return 0;
        if (y < 100) y += (y < 50 ? 2000 : 1900);
        
        let hr = 0, min = 0, sec = 0;
        if (timePart) {
            const tp = timePart.split(':');
            hr = parseInt(tp[0]) || 0;
            min = parseInt(tp[1]) || 0;
            
            const lastPart = tp[tp.length - 1] || '';
            const ampmMatch = lastPart.match(/([a-zA-Z]+)/);
            if (ampmMatch) {
                ampmPart = ampmMatch[1];
                sec = parseInt(lastPart.replace(/[a-zA-Z]+/g, '')) || 0;
            } else {
                sec = parseInt(tp[2]) || 0;
            }
            
            if (ampmPart) {
                const meridian = ampmPart.toUpperCase();
                if (meridian === 'PM' && hr < 12) hr += 12;
                if (meridian === 'AM' && hr === 12) hr = 0;
            }
        }
        
        return new Date(y, m-1, d, hr, min, sec).getTime() || 0;
    }

    function parseCSV(data) {
        let newHash = hashString(data);
        if (currentDataHash === newHash) return; 
        let isUpdate = currentDataHash !== null;
        currentDataHash = newHash;

        let rows = [], currentRow = [], currentCell = '', inQuotes = false;
        for (let i=0; i<data.length; i++) {
            let char = data[i], next = data[i+1];
            if (char === '"' && inQuotes && next === '"') { currentCell += '"'; i++; }
            else if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { currentRow.push(currentCell.trim()); currentCell = ''; }
            else if ((char === '\n' || char === '\r') && !inQuotes) {
                if (char === '\r' && next === '\n') i++;
                currentRow.push(currentCell.trim()); rows.push(currentRow); currentRow = []; currentCell = '';
            } else currentCell += char;
        }
        if (currentCell || currentRow.length) { currentRow.push(currentCell.trim()); rows.push(currentRow); }
        
        movies = rows.slice(1).map((v, index) => {
            const p = { 
                amazon: (v[3] && isValidUrl(v[3])) ? v[3].trim() : '', 
                google: (v[4] && isValidUrl(v[4])) ? v[4].trim() : '', 
                youtube: (v[5] && isValidUrl(v[5])) ? v[5].trim() : '', 
                moviesanywhere: (v[6] && isValidUrl(v[6])) ? v[6].trim() : '', 
                apple: (v[7] && isValidUrl(v[7])) ? v[7].trim() : '', 
                fandango: (v[8] && isValidUrl(v[8])) ? v[8].trim() : '' 
            };
            return {
                title: v[0]||'', image: v[1]||'', year: v[2]||'', 
                platforms: p,
                dateAdded: v[9]||'', imdbId: v[10]||'', 
                cast: v[11] ? v[11].split(',').map(s=>s.trim()).filter(Boolean) : [],
                edition: v[12]||'', collection: v[13]||'', genre: v[14]||'', runtime: v[15]||'',
                type: v[16]||'', streaming: v[17]||'', description: v[18]||'',
                holidayTag: v[19]||'', 
                videoRating: v[20]||'', 
                ratingDescription: v[21]||'', 
                timestamp: getSafeTimestamp(v[9]),
                csvIndex: index
            };
        }).filter(m => {
            const hasValidLink = m.platforms.amazon || m.platforms.google || m.platforms.youtube || 
                                 m.platforms.moviesanywhere || m.platforms.apple || m.platforms.fandango;
            return m.title && m.title.length < 120 && hasValidLink;
        });

        const totalMoviesCount = movies.length;
        if (totalMoviesCount > 0) {
            let firstValidIdx = -1;
            let lastValidIdx = -1;
            for (let i = 0; i < totalMoviesCount; i++) {
                if (movies[i].timestamp > 0) {
                    if (firstValidIdx === -1) firstValidIdx = i;
                    lastValidIdx = i;
                }
            }

            if (firstValidIdx === -1) {
                const start = new Date(2011, 0, 1).getTime();
                const end = Date.now();
                const step = (end - start) / Math.max(1, totalMoviesCount - 1);
                for (let i = 0; i < totalMoviesCount; i++) {
                    movies[i].timestamp = start + i * step;
                }
            } else {
                const firstValidT = movies[firstValidIdx].timestamp;
                const lastValidT = movies[lastValidIdx].timestamp;

                if (firstValidIdx > 0) {
                    const baselineStart = new Date(2011, 0, 1).getTime();
                    const span = firstValidT - baselineStart;
                    const step = span / firstValidIdx;
                    for (let i = 0; i < firstValidIdx; i++) {
                        movies[i].timestamp = baselineStart + i * step;
                    }
                }

                const forwardCount = totalMoviesCount - 1 - lastValidIdx;
                if (forwardCount > 0) {
                    const todayT = Date.now();
                    const span = todayT - lastValidT;
                    const step = span / (forwardCount + 1);
                    for (let i = lastValidIdx + 1; i < totalMoviesCount; i++) {
                        movies[i].timestamp = lastValidT + (i - lastValidIdx) * step;
                    }
                }

                let prevValidIdx = firstValidIdx;
                for (let i = firstValidIdx + 1; i <= lastValidIdx; i++) {
                    if (movies[i].timestamp > 0) {
                        if (i - prevValidIdx > 1) {
                            const tStart = movies[prevValidIdx].timestamp;
                            const tEnd = movies[i].timestamp;
                            const steps = i - prevValidIdx;
                            const step = (tEnd - tStart) / steps;
                            for (let j = prevValidIdx + 1; j < i; j++) {
                                movies[j].timestamp = tStart + (j - prevValidIdx) * step;
                            }
                        }
                        prevValidIdx = i;
                    }
                }
            }
        }

        const validDateAddedList = movies.filter(m => m.timestamp > 0);

                    let d = remDays % 7;

    window.runFilters = () => {
        const query = document.getElementById('movie-search').value.toLowerCase();
        const typeF = document.getElementById('type-select').value;
        const ratingF = document.getElementById('rating-select').value;
        const platformF = document.getElementById('platform-select').value;
        const holidayF = document.getElementById('holiday-select').value;
        const genreF = document.getElementById('genre-select').value;
        const collF = document.getElementById('collection-select').value;
        const artF = document.getElementById('artist-select').value;
        const sort = document.getElementById('sort-select').value;
        const queryWords = query.split(/\s+/).filter(w => w.length > 0);

        document.body.classList.remove('bg-amazon', 'bg-google', 'bg-youtube', 'bg-moviesanywhere', 'bg-apple', 'bg-fandango');

            document.body.classList.add('bg-' + platformF);
        }

        let filtered = movies.filter(m => {
            const pool = [m.title, m.year, ...m.cast].join(' ').toLowerCase();
            const searchMatch = queryWords.length === 0 || queryWords.every(word => pool.includes(word));
            
            const typeMatch = !typeF || (typeF === 'TV' ? m.type.toLowerCase().includes('tv') : m.type.toLowerCase().includes('movie'));
            const platformMatch = !platformF || (m.platforms[platformF] && m.platforms[platformF].trim() !== '');
            const ratingMatch = !ratingF || m.videoRating === ratingF;

            const holidayObj = detectHoliday(m);
            const holidayMatch = !holidayF || (holidayObj && holidayObj.name === holidayF);
            
            const genreMatch = !genreF || m.genre.toLowerCase().includes(genreF.toLowerCase());
            const collMatch = !collF || m.collection === collF;
            const artMatch = !artF || m.cast.some(a => a.toLowerCase() === artF.toLowerCase());
            return searchMatch && typeMatch && platformMatch && ratingMatch && holidayMatch && genreMatch && collMatch && artMatch;
        });

        if (collF && sort === 'newest') {
            filtered.sort((a,b) => (parseInt(a.year)||0) - (parseInt(b.year)||0) || a.title.localeCompare(b.title));
        } else {
            if (sort === 'newest') filtered.sort((a,b) => (b.timestamp - a.timestamp) || (b.csvIndex - a.csvIndex));
            else if (sort === 'oldest') filtered.sort((a,b) => (a.timestamp - b.timestamp) || (a.csvIndex - b.csvIndex));
            else if (sort === 'az') filtered.sort((a,b) => a.title.toLowerCase().localeCompare(b.title.toLowerCase()));
            else if (sort === 'za') filtered.sort((a,b) => b.title.toLowerCase().localeCompare(a.title.toLowerCase()));
            else if (sort === 'new-old') filtered.sort((a,b) => (parseInt(b.year)||0) - (parseInt(a.year)||0));
            else if (sort === 'old-new') filtered.sort((a,b) => (parseInt(b.year)||0) - (parseInt(a.year)||0));

    // --- STREAMING_CHUNK: Integrating automated TV tracker API... ---
    async function buildTvTracker(m) {
        const bingeContainer = document.getElementById('lb-tv-binge-container');
        if (!bingeContainer) return;

        bingeContainer.innerHTML = `
            <div class="binge-header black-outline">📺 SERIES WATCHLIST COMPANION</div>
            <div style="text-align: center; color: #aaa; font-size: 11px; padding: 15px;">
                <span class="loading-spinner"></span> Loading episode directory...
            </div>
        `;

        try {
            let lookupUrl = '';
            let rawId = m.imdbId ? m.imdbId.trim() : '';

            if (rawId.toLowerCase().startsWith('tvdb-')) {
                const cleanTvdbId = rawId.replace(/tvdb-/i, '').trim();
                lookupUrl = `https://api.tvmaze.com/lookup/shows?thetvdb=${cleanTvdbId}`;
            } else if (rawId.startsWith('tt')) {
                lookupUrl = `https://api.tvmaze.com/lookup/shows?imdb=${rawId}`;
            } else if (/^\d+$/.test(rawId)) {
                lookupUrl = `https://api.tvmaze.com/lookup/shows?thetvdb=${rawId}`;
            } else {
                lookupUrl = `https://api.tvmaze.com/singlesearch/shows?q=${encodeURIComponent(m.title)}`;
            }

            const showResponse = await fetch(lookupUrl);
            if (!showResponse.ok) throw new Error('Could not resolve show ID');
            const showData = await showResponse.json();

            const epResponse = await fetch(`https://api.tvmaze.com/shows/${showData.id}/episodes`);
            if (!epResponse.ok) throw new Error('Could not fetch episode list');
            const episodes = await epResponse.json();

            if (!episodes || episodes.length === 0) {
                throw new Error('No cataloged episodes available');
            }

            const storageKey = `ww_binge_${m.title.replace(/[^a-zA-Z0-9]/g, '_')}_${m.year}`;
            let progress = JSON.parse(localStorage.getItem(storageKey) || '{"completed":[]}');
            
            let listHtml = '';
            episodes.forEach(ep => {
                const epIdentifier = `${ep.season}x${ep.number}`;
                const checked = progress.completed.includes(epIdentifier) ? 'checked' : '';
                const epTitle = ep.name || `Episode ${ep.number}`;
                listHtml += `
                    <label class="binge-ep-row black-outline" title="${epTitle} (Aired: ${ep.airdate || 'N/A'})">
                        <input type="checkbox" class="binge-checkbox" data-ep="${epIdentifier}" ${checked} 
                               onchange="updateBingeProgress('${storageKey}', '${epIdentifier}', this, ${episodes.length})">
                        <span>S${ep.season}E${ep.number} - ${epTitle}</span>
                    </label>
                `;
            });

            bingeContainer.innerHTML = `
                <div class="binge-header black-outline">📺 SERIES WATCHLIST COMPANION</div>
                <div class="binge-progress-bar-wrapper">
                    <div class="binge-progress-bar" id="binge-progress-bar-el" style="width: 0%;"></div>
                </div>
                <div class="binge-progress-text" id="binge-progress-text-el">0 of ${episodes.length} complete</div>
                <div class="binge-episode-list">
                    ${listHtml}
                </div>
            `;

            window.updateBingeProgress = function(key, epId, element, totalCount) {
                let prog = JSON.parse(localStorage.getItem(key) || '{"completed":[]}');
                if (element.checked) {
                    if (!prog.completed.includes(epId)) prog.completed.push(epId);
                } else {
                    prog.completed = prog.completed.filter(item => item !== epId);
                }
                localStorage.setItem(key, JSON.stringify(prog));
                setBingeUI(prog.completed.length, totalCount);
            };

            function setBingeUI(count, total) {
                const percent = total > 0 ? (count / total) * 100 : 0;
                const bar = document.getElementById('binge-progress-bar-el');
                const txt = document.getElementById('binge-progress-text-el');
                if (bar) bar.style.width = percent + '%';
                if (txt) txt.textContent = `${count} of ${total} episodes watched (${Math.round(percent)}%)`;
            }

            setBingeUI(progress.completed.length, episodes.length);

        } catch (err) {
            console.warn("TVMaze API Lookup failure, falling back to mock engine", err);
            renderFallbackTracker(m, bingeContainer);
        }
    }

    function renderFallbackTracker(m, bingeContainer) {
        const storageKey = `ww_binge_${m.title.replace(/[^a-zA-Z0-9]/g, '_')}_${m.year}`;
        let progress = JSON.parse(localStorage.getItem(storageKey) || '{"completed":[]}');
        
        let listHtml = '';
        for(let i = 1; i <= 8; i++) {
            const checked = progress.completed.includes(i) ? 'checked' : '';
            listHtml += `
                <label class="binge-ep-row black-outline">
                    <input type="checkbox" class="binge-checkbox" data-ep="${i}" ${checked} onchange="updateBingeProgressFallback('${storageKey}', ${i}, this)">
                    <span>Episode ${i}</span>
                </label>
            `;
        }

        bingeContainer.innerHTML = `
            <div class="binge-header black-outline">📺 SERIES WATCHLIST COMPANION (Offline Fallback)</div>
            <div class="binge-progress-bar-wrapper">
                <div class="binge-progress-bar" id="binge-progress-bar-el" style="width: 0%;"></div>
            </div>
            <div class="binge-progress-text" id="binge-progress-text-el">0 of 8 complete</div>
            <div class="binge-episode-list">
                ${listHtml}
            </div>
        `;

        window.updateBingeProgressFallback = function(key, epNum, element) {
            let prog = JSON.parse(localStorage.getItem(key) || '{"completed":[]}');
            if (element.checked) {
                if (!prog.completed.includes(epNum)) prog.completed.push(epNum);
            } else {
                prog.completed = prog.completed.filter(item => item !== epNum);
            }
            localStorage.setItem(key, JSON.stringify(prog));
            setBingeUI(prog.completed.length);
        };

        function setBingeUI(count) {
            const percent = (count / 8) * 100;
            const bar = document.getElementById('binge-progress-bar-el');
            const txt = document.getElementById('binge-progress-text-el');
            if (bar) bar.style.width = percent + '%';
            if (txt) txt.textContent = `${count} of 8 episodes watched (${Math.round(percent)}%)`;
        }

        setBingeUI(progress.completed.length);
    }

                } else if (key.includes('movies anywhere') || key === 'ma') {
                    targetUrl = m.platforms.moviesanywhere ? m.platforms.moviesanywhere : getStreamingSearchUrl('moviesanywhere', m.title);
                } else {
                    for (const mapKey of Object.keys(streamMap)) {

    function updateDropdowns() {
        const gSet = new Set(), cSet = new Set(), aSet = new Set(), rSet = new Set();
        movies.forEach(m => { 
            if(m.genre) m.genre.split(',').forEach(g => { const clean = g.trim(); if(clean) gSet.add(clean); });
            if(m.collection) cSet.add(m.collection);
            m.cast.forEach(a => aSet.add(a));
            if(m.videoRating) rSet.add(m.videoRating.trim());
        });
        const fill = (id, set, label) => {
            const el = document.getElementById(id); if (!el) return;
            const cur = el.value; el.innerHTML = `<option value="">All ${label}</option>`;
            const fragment = document.createDocumentFragment();
            Array.from(set).sort((a,b) => a.toLowerCase().localeCompare(b.toLowerCase())).forEach(v => {
                const o = document.createElement('option'); o.value = v; o.textContent = v;
                if (v === cur) o.selected = true; fragment.appendChild(o);
            });
            el.appendChild(fragment);
        };
        fill('genre-select', gSet, 'Genres'); fill('collection-select', cSet, 'Collections'); fill('artist-select', aSet, 'Artists'); fill('rating-select', rSet, 'Ratings');
    }

    window.resetFilters = () => { 
        ['movie-search','type-select','rating-select','platform-select','holiday-select','genre-select','collection-select','artist-select'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        }); 
        document.getElementById('sort-select').value = 'newest'; 
        runFilters(); 
    };

    const startClock = () => { const update = () => { const now = new Date(); document.getElementById('header-clock').textContent = `${now.toLocaleDateString()} | ${now.toLocaleTimeString()}`; }; update(); setInterval(update, 1000); };
    window.onload = () => { 
        startClock(); 
        loadCSV(); 
        setInterval(loadCSV, 30000); 

        if (typeof gtag === 'function') {
            gtag('event', 'view_digital_library', {
                'library_owner': 'Werewolf3788',
                'catalog_type': 'Personal Owned Collection Directory',
                'attribution_policy': 'Amazon Affiliate Only Monetized',
                'library_category': 'Digital Movie Purchases Catalog'
            });
        }
    };
})();
</script>
